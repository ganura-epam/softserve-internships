<svg width="220" height="60" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- BOLD and PROMINENT double dollar signs logo -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded rectangle for contrast -->
  <rect x="5" y="8" width="44" height="44" rx="8" fill="#f0f9ff" opacity="0.8"/>

  <!-- First Dollar Sign - LARGE and BOLD (BLACK to match "Soft") -->
  <text x="10" y="42"
        font-family="Arial, sans-serif"
        font-size="36"
        font-weight="900"
        fill="#1e293b"
        filter="url(#shadow)">$</text>

  <!-- Second Dollar Sign - LARGE and BOLD (overlapped slightly) -->
  <text x="24" y="42"
        font-family="Arial, sans-serif"
        font-size="36"
        font-weight="900"
        fill="#6366f1"
        filter="url(#shadow)">$</text>

  <!-- Company Name -->
  <text x="58" y="28" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1e293b">
    Soft<tspan fill="#2563eb">Serve</tspan>
  </text>
  <text x="58" y="45" font-family="Arial, sans-serif" font-size="9" font-weight="500" fill="#64748b" letter-spacing="2">
    TECHNOLOGIES
  </text>
</svg>
